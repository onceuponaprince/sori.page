openapi: 3.0.3
info:
  title: Sori Context Engine API
  version: 0.1.0
  description: |
    White-label context engine surface for graph retrieval and multiverse simulation.
servers:
  - url: http://localhost:8001
    description: Local context-engine service
security:
  - ApiKeyAuth: []
tags:
  - name: graph
  - name: retrieval
  - name: agent
paths:
  /api/graph/concepts/search/:
    get:
      tags: [graph]
      summary: Search graph concepts and functions
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphSearchResponse"
  /api/retrieval/analyze/:
    post:
      tags: [retrieval]
      summary: Analyze outline structure against graph context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outline]
              properties:
                outline:
                  type: string
                title:
                  type: string
                story_uid:
                  type: string
                enrich:
                  type: boolean
      responses:
        "200":
          description: Retrieval analysis payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/multiverse/{storyUid}/:
    get:
      tags: [agent]
      summary: Load complete multiverse tree for a story
      parameters:
        - in: path
          name: storyUid
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tree response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiverseTreeResponse"
  /api/agent/simulate/:
    post:
      tags: [agent]
      summary: Start simulation task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateRequest"
      responses:
        "202":
          description: Task accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateAcceptedResponse"
  /api/agent/simulate/{taskId}/status/:
    get:
      tags: [agent]
      summary: Poll simulation task state
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Polling response
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                  data:
                    type: object
                    nullable: true
                    additionalProperties: true
                  error:
                    type: string
                    nullable: true
  /api/agent/branch/:
    post:
      tags: [agent]
      summary: Create a branch node from selected choice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchRequest"
      responses:
        "201":
          description: Branch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchResponse"
  /api/agent/commit/:
    post:
      tags: [agent]
      summary: Commit branch node to canon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitRequest"
      responses:
        "200":
          description: Commit complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitResponse"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    GraphSearchResult:
      type: object
      properties:
        uid: { type: string }
        name: { type: string }
        description: { type: string }
        depth_score: { type: integer }
        confidence: { type: number }
        relevance_score: { type: number }
        type: { type: string }
    GraphSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/GraphSearchResult"
        source:
          type: string
    MultiverseTreeResponse:
      type: object
      properties:
        rootNodeId:
          type: string
          nullable: true
        nodes:
          type: object
          additionalProperties:
            type: object
    SimulateRequest:
      type: object
      required: [story_uid, scene_goal, character_ids]
      properties:
        story_uid: { type: string }
        scene_goal: { type: string }
        character_ids:
          type: array
          minItems: 2
          maxItems: 2
          items: { type: string }
        state_snapshot_id:
          type: string
          nullable: true
        parent_node_id:
          type: string
          nullable: true
    SimulateAcceptedResponse:
      type: object
      properties:
        taskId: { type: string }
        nodeId: { type: string }
    BranchRequest:
      type: object
      required: [source_node_id, choice_label, intent, state_snapshot_id]
      properties:
        source_node_id: { type: string }
        choice_label: { type: string }
        intent: { type: string }
        state_snapshot_id: { type: string }
    CommitRequest:
      type: object
      required: [node_id, story_uid]
      properties:
        node_id: { type: string }
        story_uid: { type: string }
    BranchResponse:
      type: object
      properties:
        edge:
          type: object
          additionalProperties: true
        targetNode:
          type: object
          additionalProperties: true
        snapshot:
          type: object
          additionalProperties: true
    CommitResponse:
      type: object
      properties:
        node:
          type: object
          additionalProperties: true
        relationalBeatId: { type: string }
        worldStateChangeSummary: { type: string }
